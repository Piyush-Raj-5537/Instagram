<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Instagram</title>
  
  <!-- PWA Metadata -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/app-icon.png">
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Grand+Hotel&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- App Wrapper Shell -->
  <div id="app-shell">
    
    <!-- 1. Mobile Top Header (Android app style) -->
    <header id="mobile-header" class="mobile-only-header">
      <h1 class="instagram-logo-text">Instagram</h1>
      <div class="mobile-header-actions">
        <button class="nav-link-btn" data-view="notifications" id="mobile-notif-btn">
          <i class="far fa-heart"></i>
          <span class="badge" style="display:none;"></span>
        </button>
        <button class="nav-link-btn" data-view="messages" id="mobile-chat-btn">
          <i class="far fa-paper-plane"></i>
          <span class="badge" style="display:none;"></span>
        </button>
      </div>
    </header>

    <!-- 2. Desktop Sidebar Navigation -->
    <aside id="desktop-sidebar" class="desktop-only-sidebar">
      <div class="sidebar-logo">
        <h1 class="instagram-logo-text">Instagram</h1>
      </div>
      <nav class="sidebar-nav-links">
        <button class="nav-item active" data-view="feed" id="nav-feed">
          <i class="fas fa-home"></i> <span>Home</span>
        </button>
        <button class="nav-item" data-view="explore" id="nav-explore">
          <i class="far fa-compass"></i> <span>Explore</span>
        </button>
        <button class="nav-item" data-view="reels" id="nav-reels">
          <i class="fas fa-film"></i> <span>Reels</span>
        </button>
        <button class="nav-item" data-view="messages" id="nav-messages">
          <i class="far fa-paper-plane"></i> <span>Messages</span>
        </button>
        <button class="nav-item" data-view="notifications" id="nav-notifications">
          <i class="far fa-heart"></i> <span>Notifications</span>
        </button>
        <button class="nav-item" data-view="create" id="nav-create">
          <i class="far fa-plus-square"></i> <span>Create</span>
        </button>
        <button class="nav-item" data-view="profile" id="nav-profile">
          <img src="assets/avatar-current.png" class="sidebar-profile-avatar" id="sidebar-avatar-img">
          <span>Profile</span>
        </button>
      </nav>
      <div class="sidebar-more-menu">
        <button class="nav-item" id="pwa-install-btn" style="display: none;">
          <i class="fas fa-download"></i> <span>Install App</span>
        </button>
        <button class="nav-item" id="theme-toggle-btn">
          <i class="fas fa-moon"></i> <span>Dark Mode</span>
        </button>
        <button class="nav-item" id="logout-btn">
          <i class="fas fa-sign-out-alt"></i> <span>Log Out</span>
        </button>
      </div>
    </aside>

    <!-- 3. Main Viewer Area -->
    <main id="app-viewer">
      <!-- Injected Views (Feed, Explore, Reels, Messages, Create, Profile) go here -->
      <div class="app-loading">
        <div class="spinner"></div>
      </div>
    </main>

    <!-- 4. Mobile Bottom Tab Bar (Android style navigation) -->
    <nav id="mobile-bottom-nav" class="mobile-only-footer">
      <button class="nav-item active" data-view="feed" id="mobile-nav-feed">
        <i class="fas fa-home"></i>
      </button>
      <button class="nav-item" data-view="explore" id="mobile-nav-explore">
        <i class="far fa-compass"></i>
      </button>
      <button class="nav-item" data-view="create" id="mobile-nav-create">
        <i class="far fa-plus-square"></i>
      </button>
      <button class="nav-item" data-view="reels" id="mobile-nav-reels">
        <i class="fas fa-film"></i>
      </button>
      <button class="nav-item" data-view="profile" id="mobile-nav-profile">
        <img src="assets/avatar-current.png" class="bottom-nav-avatar" id="bottom-avatar-img">
      </button>
    </nav>

  </div>

  <!-- Shared Popup Modals Container (Story viewer, detail views) -->
  <div id="story-viewer-modal" class="story-viewer-modal-overlay"></div>
  <div id="post-details-modal" class="modal-overlay"></div>
  <div id="edit-profile-modal" class="modal-overlay"></div>

  <!-- Dynamic Options Sheet Overlay (Instagram Style) -->
  <div id="options-sheet" class="options-sheet-overlay">
    <div class="options-sheet-content"></div>
  </div>

  <!-- Floating Toast Notification Banner -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Service Worker / App Logic scripts -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
